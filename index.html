<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard - SGD</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; background: #f5f5f5; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 30px; }
.header h1 { font-size: 32px; margin-bottom: 8px; }
.header p { font-size: 14px; opacity: 0.9; }
.upload-section { padding: 30px; border-bottom: 1px solid #eee; }
.upload-section label { display: block; margin-bottom: 12px; font-weight: 500; }
input[type="file"] { padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-right: 12px; }
button { padding: 10px 24px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
button:hover { background: #5568d3; }
#content { display: none; padding: 30px; }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 40px; }
.metric-card { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; }
.metric-card label { display: block; font-size: 12px; color: #666; margin-bottom: 8px; text-transform: uppercase; }
.metric-card .value { font-size: 28px; font-weight: 600; color: #333; }
.section { margin-bottom: 40px; }
.section h2 { font-size: 20px; margin-bottom: 16px; color: #333; border-bottom: 2px solid #667eea; padding-bottom: 12px; }
.currency-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.currency-card { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 2px solid #667eea; }
.currency-card h3 { font-size: 18px; margin-bottom: 12px; color: #667eea; }
.currency-card p { font-size: 13px; color: #666; margin-bottom: 8px; display: flex; justify-content: space-between; }
.amount { color: #667eea; font-weight: 600; }
table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 13px; }
thead { background: #f8f9fa; }
th { padding: 12px 16px; text-align: left; font-weight: 600; color: #666; border-bottom: 1px solid #e0e0e0; }
td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
.positive { color: #28a745; font-weight: 500; }
.negative { color: #dc3545; font-weight: 500; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📈 Trading Dashboard (SGD)</h1>
    <p>Complete trading analysis - all amounts in SGD</p>
  </div>

  <div class="upload-section">
    <label>📊 Upload Your trades.csv File:</label>
    <input type="file" id="csvFile" accept=".csv">
    <button onclick="loadCSV()">Upload CSV</button>
  </div>

  <div id="content"></div>
</div>

<script>
const rates = { 'SGD': 1.0, 'USD': 1.35, 'JPY': 0.0077, 'HKD': 0.173, 'EUR': 1.48, 'GBP': 1.71, 'INR': 0.016, 'CNY': 0.19 };

function loadCSV() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) { alert('Please select a CSV file'); return; }
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const csv = e.target.result;
    const lines = csv.split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
    const trades = [];
    
    for (let i = 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      const values = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
      const obj = {};
      headers.forEach((h, idx) => obj[h] = values[idx]);
      trades.push(obj);
    }
    
    analyze(trades);
  };
  reader.readAsText(file);
}

function analyze(trades) {
  const filled = trades.filter(t => t.status === 'Filled');
  const currencies = {};
  let totalSGD = 0, totalFees = 0;
  let exitedPositions = [];
  const tradesBySymbol = {};
  
  filled.forEach(t => {
    const curr = t.currency || 'SGD';
    const qty = parseFloat(t.fill_qty) || 0;
    const price = parseFloat(t.fill_price) || 0;
    const amount = qty * price;
    const sgd = amount * (rates[curr] || 1);
    const fees = parseFloat(t.fees) || 0;
    
    if (!currencies[curr]) currencies[curr] = { local: 0, sgd: 0, trades: 0, fees: 0 };
    currencies[curr].local += amount;
    currencies[curr].sgd += sgd;
    currencies[curr].trades += 1;
    currencies[curr].fees += fees;
    totalSGD += sgd;
    totalFees += fees;

    const sym = t.symbol;
    if (!tradesBySymbol[sym]) tradesBySymbol[sym] = { buys: [], sells: [] };
    if (t.side === 'Buy') tradesBySymbol[sym].buys.push(t);
    else if (t.side === 'Sell') tradesBySymbol[sym].sells.push(t);
  });

  Object.keys(tradesBySymbol).forEach(sym => {
    const buys = tradesBySymbol[sym].buys;
    const sells = tradesBySymbol[sym].sells;
    if (buys.length > 0 && sells.length > 0) {
      const avgBuyPrice = buys.reduce((s, b) => s + (parseFloat(b.fill_price) || 0), 0) / buys.length;
      const avgSellPrice = sells.reduce((s, s2) => s + (parseFloat(s2.fill_price) || 0), 0) / sells.length;
      const returnPct = ((avgSellPrice - avgBuyPrice) / avgBuyPrice * 100);
      const totalBuyQty = buys.reduce((s, b) => s + (parseFloat(b.fill_qty) || 0), 0);
      const returnAmount = totalBuyQty * (avgSellPrice - avgBuyPrice);
      exitedPositions.push({ sym, avgBuyPrice: avgBuyPrice.toFixed(2), avgSellPrice: avgSellPrice.toFixed(2), returnPct: returnPct.toFixed(2), returnAmount: Math.round(returnAmount) });
    }
  });

  const netReturn = exitedPositions.reduce((sum, p) => sum + parseInt(p.returnAmount), 0);

  let html = `
    <div class="metrics">
      <div class="metric-card"><label>Total Trades</label><div class="value">${filled.length}</div></div>
      <div class="metric-card"><label>Total Capital (SGD)</label><div class="value">SGD ${Math.round(totalSGD).toLocaleString()}</div></div>
      <div class="metric-card"><label>Total Fees (SGD)</label><div class="value">SGD ${totalFees.toFixed(2)}</div></div>
      <div class="metric-card"><label>Net Return (Exited)</label><div class="value ${netReturn >= 0 ? 'positive' : 'negative'}">${netReturn >= 0 ? '+' : ''}$${Math.round(netReturn).toLocaleString()}</div></div>
    </div>

    <div class="section">
      <h2>💱 Currency Breakdown (All in SGD)</h2>
      <table>
        <thead><tr><th>Currency</th><th>Trades</th><th>Local Amount</th><th>SGD Amount</th><th>% of Total</th><th>Exchange Rate</th></tr></thead>
        <tbody>
  `;
  
  Object.keys(currencies).sort().forEach(curr => {
    const c = currencies[curr];
    const pct = ((c.sgd / totalSGD) * 100).toFixed(1);
    const rate = rates[curr];
    html += `<tr><td>${curr}</td><td>${c.trades}</td><td>${Math.round(c.local).toLocaleString()} ${curr}</td><td>SGD ${Math.round(c.sgd).toLocaleString()}</td><td>${pct}%</td><td>1 ${curr} = ${rate.toFixed(4)} SGD</td></tr>`;
  });
  
  html += `</tbody></table></div>`;

  if (exitedPositions.length > 0) {
    html += `<div class="section"><h2>📊 Exited Positions & Returns</h2><table><thead><tr><th>Symbol</th><th>Avg Buy</th><th>Avg Sell</th><th>Return %</th><th>Return $</th></tr></thead><tbody>`;
    exitedPositions.forEach(pos => {
      const cls = pos.returnPct >= 0 ? 'positive' : 'negative';
      html += `<tr><td><strong>${pos.sym}</strong></td><td>$${pos.avgBuyPrice}</td><td>$${pos.avgSellPrice}</td><td class="${cls}">${pos.returnPct >= 0 ? '+' : ''}${pos.returnPct}%</td><td class="${cls}">${pos.returnAmount >= 0 ? '+' : ''}$${pos.returnAmount.toLocaleString()}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  }

  document.getElementById('content').innerHTML = html;
  document.getElementById('content').style.display = 'block';
}
</script>
</body>
</html>
